<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      setTimeout(function () {
        const p = new Promise(function (resolve, reject) {
          console.log(1);
          resolve();
        });
        p.then(() => {
          console.log(2);
        });
        console.log(3);
      }, 1000);

      const np = new Promise((resolve, reject) => {
        console.log(5);
        resolve();
      })
        .then(() => {
          setTimeout(() => {
            console.log(6);
          }, 0);
          return 7;
        })
        .then((n) => {
          console.log(n);
        });

      console.log(4);
    </script>
  </body>
</html>
